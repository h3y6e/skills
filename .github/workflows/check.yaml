name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix flake check
      - run: nix develop -c sh -c 'go vet ./... && staticcheck ./...'
