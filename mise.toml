[tools]
"aqua:dominikh/go-tools/staticcheck" = "2026.1"
go = "1.26.1"

[tasks.build]
run = "go build -o skills ."

[tasks.check]
run = "gofmt -l . && go vet ./... && staticcheck ./..."

[tasks.fmt]
run = "gofmt -w ."

[tasks.test]
run = "go test ./..."

[tasks.prerelease]
run = ["go mod tidy", "git add go.mod go.sum"]
