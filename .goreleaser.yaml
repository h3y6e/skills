# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

builds:
  - env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  use: github-native

release:
  use_existing_draft: true
